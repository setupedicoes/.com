<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Setup Edições | Mods ETS2</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0a0a0a;
color:white;
}

header{
background:black;
border-bottom:2px solid gold;
padding:15px;
display:flex;
align-items:center;
justify-content:center;
gap:20px;
}

header img{
height:70px;
}

.banner{
background:linear-gradient(90deg, black, #111);
padding:60px;
text-align:center;
border-bottom:2px solid gold;
}

.banner h1{
font-size:40px;
color:gold;
margin:0;
}

.banner p{
font-size:18px;
color:#ccc;
}

.container{
max-width:1200px;
margin:auto;
padding:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
}

.card{
background:#111;
border-radius:15px;
overflow:hidden;
transition:0.3s;
box-shadow:0 0 20px rgba(255,215,0,0.15);
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 0 25px rgba(255,215,0,0.4);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card h2{
padding:15px;
font-size:20px;
}

.preco{
color:gold;
font-size:24px;
padding:0 15px;
}

.botao{
display:block;
background:gold;
color:black;
text-align:center;
padding:14px;
margin:15px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
cursor:pointer;
}

.botao:hover{
background:#ffd700;
}

footer{
border-top:2px solid gold;
padding:25px;
text-align:center;
color:#aaa;
}

</style>

<script>
function pagarPix(){
const chave = "setupedicoes@gmail.com";

navigator.clipboard.writeText(chave).then(()=>{
alert("Chave Pix copiada!\n\n" + chave + "\n\nAgora é só colar no seu banco e finalizar o pagamento.");
});
}
</script>

</head>

<body>

<header>
<img src="logo.png">
</header>

<div class="banner">

<img src="banner.jpg" height="50%" width="100%">

<h1>Mods Setup Edições</h1>

<p>Qualidade profissional para seu Euro Truck Simulator 2</p>

</div>

<div class="container">

<div class="card">
<img src="mod1.jpg">
<h2>Reboque 3x3 Randon Curto</h2>
<p class="preco">R$ 29,90</p>
<a class="botao" onclick="pagarPix()">Pagar via Pix</a>
</div>

<div class="card">
<img src="mod2.jpg">
<h2>Mercedes Benz Atron 1635</h2>
<p class="preco">R$ 29,90</p>
<a class="botao" onclick="pagarPix()">Pagar via Pix</a>
</div>

<div class="card">
<img src="mod3.jpg">
<h2>Mercedes L1620 Eletronic</h2>
<p class="preco">R$ 39,90</p>
<a class="botao" onclick="pagarPix()">Pagar via Pix</a>
</div>

</div>

<footer>
<p>© Setup Edições - Loja de Mods ETS2</p>
Suporte setupedicoes@gmail.com
</footer>

</body>
</html>
